<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="card login-card">
    <div class="card-body">
      <h5 class="card-title text-center mb-4">Sign in to your dashboard</h5>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group mb-3">
          <input
            type="text"
            class="form-control"
            placeholder="Username"
            formControlName="username"
            [ngClass]="{'is-invalid': loginForm.get('username')?.invalid && loginForm.get('username')?.touched}"
          />
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <div class="form-group mb-3">
          <input
            type="password"
            class="form-control"
            placeholder="Password"
            formControlName="password"
            [ngClass]="{'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
          />
          <div class="invalid-feedback">Password is required.</div>
        </div>

        <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Signing in...' : 'SIGN IN' }}
        </button>
      </form>
    </div>
  </div>
</div>
